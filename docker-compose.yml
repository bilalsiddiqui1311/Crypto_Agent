services:
  postgres:
    image: postgres:17-alpine
    container_name: crypto-ai-postgres
    environment:
      POSTGRES_DB: crypto_ai
      POSTGRES_USER: crypto_ai
      POSTGRES_PASSWORD: crypto_ai_password
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - crypto_ai_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crypto_ai -d crypto_ai"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: crypto-ai-backend
    ports:
      - "8000:8000"
    environment:
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: postgresql+psycopg://crypto_ai:crypto_ai_password@postgres:5432/crypto_ai
      AUTH_SECRET: ${AUTH_SECRET:-change-this-local-secret}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5-mini}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5).read()"
        ]
      interval: 10s
      timeout: 6s
      retries: 6
      start_period: 15s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: crypto-ai-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    restart: unless-stopped

volumes:
  crypto_ai_postgres_data:
